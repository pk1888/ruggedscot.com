<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuggedScot</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #fafafa; }
    .loading { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
    .spinner { width: 40px; height: 40px; border: 3px solid #ddd; border-top-color: #2d5a4a; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
  <script>
    (function() {
      var path = location.pathname + location.search + location.hash;
      var redirect = sessionStorage.getItem('spa-redirect');
      if (!redirect) {
        sessionStorage.setItem('spa-redirect', path);
      }
      location.replace('/');
    })();
  </script>
</body>
</html>
